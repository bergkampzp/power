<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <title>数据同步扩展设置</title>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 500px; }
    input { width: 100%; margin-top: 4px; padding: 6px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    button { margin-top: 10px; padding: 6px 16px; cursor: pointer; }
    #save { background: #1890ff; color: #fff; border: none; border-radius: 4px; }
    #test { background: #fff; border: 1px solid #1890ff; color: #1890ff; border-radius: 4px; margin-left: 8px; }
    label { display: block; margin-top: 16px; font-weight: 600; }
    #msg { margin-top: 12px; padding: 8px; border-radius: 4px; display: none; }
    #msg.ok  { background: #f6ffed; border: 1px solid #b7eb8f; color: #389e0d; display: block; }
    #msg.err { background: #fff2f0; border: 1px solid #ffccc7; color: #cf1322; display: block; }
    #msg.warn{ background: #fffbe6; border: 1px solid #ffe58f; color: #d48806; display: block; }
  </style>
</head>
<body>
  <h2>云南电价数据同步 — 扩展设置</h2>

  <label>后端地址
    <input id="url" type="url" placeholder="http://localhost:5000">
  </label>

  <label>配对令牌（从 Web 设置页"生成配对令牌"按钮获取）
    <input id="tok" type="password" placeholder="粘贴令牌">
  </label>

  <div style="margin-top:16px">
    <button id="save">保存</button>
    <button id="test">立即推送一次</button>
  </div>

  <p id="msg"></p>

  <hr style="margin-top:24px">
  <p style="color:#888;font-size:12px">
    使用说明：保存后，每次登录 spot.poweremarket.com 时扩展会自动推送 CAMSID 到后端并触发数据同步。
  </p>

  <script src="options.js"></script>
</body>
</html>
